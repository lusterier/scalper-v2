[project]
name = "scalper-v2-core"
version = "0.1.0"
description = "Shared domain types, ScalperError root, idempotency markers, UTC time helper. Stdlib only."
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Flat layout: source files live in packages/core/ directly. Remap the wheel
# so it installs at import path `packages.core` (matching existing
# `from packages.core import ...` call sites per brief §543 and T-005 tests).
# `packages/__init__.py` is deliberately excluded from every member wheel —
# PEP 420 namespace package at install time lets packages.core and
# packages.observability share the `packages` namespace without conflicting
# on __init__.py. Rationale: ADR-0002.
[tool.hatch.build.targets.wheel]
include = ["*.py", "py.typed"]
exclude = ["tests/**", "**/__pycache__/**"]

[tool.hatch.build.targets.wheel.sources]
"" = "packages/core"
