[project]
name = "scalper-v2-exchange"
version = "0.1.0"
description = "ExchangeClient protocol plus BybitV5Adapter and PaperExchange implementations. Scaffold stub; implementation lands in F2."
requires-python = ">=3.12"
dependencies = [
    "asyncpg==0.30.0",
    "httpx==0.28.1",
    # T-209 BybitV5PrivateWs — Bybit V5 private WS for execution + position
    # streams. Same `websockets` library + version as packages/market
    # (Binance public WS); workspace re-use, not a new ecosystem dep.
    # Alternatives (`aiohttp.ws`, `httpx-ws`) rejected per §0.9: would add
    # a parallel WS stack to the one already vetted for H-007 in F1.
    "websockets==15.0.1",
    "scalper-v2-core",
    # T-504 HistoricalSignalSource reuses SignalRow projection from
    # packages.db.queries.analytics:SignalRow (11-field DRY); workspace
    # internal edge, no external package added. Mirrors packages/scoring
    # precedent (its own scalper-v2-db edge for FeatureRow projections).
    "scalper-v2-db",
]

[tool.uv.sources]
scalper-v2-core = { workspace = true }
scalper-v2-db = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Hatch scaffold per ADR-0002 — flat-layout source files live under
# packages/exchange/; sources remap adds the wheel prefix so imports resolve
# as `from packages.exchange import ...`. dev-mode-dirs = ["."] bypasses
# hatchling editable-mode detection (pfmoore/editables#20). Explicit config
# required because flat-layout has 2 sub-packages (paper + bybit_v5) which
# default setuptools auto-discovery cannot disambiguate.
[tool.hatch.build.targets.wheel]
include = ["*.py", "py.typed"]
exclude = ["tests/**", "**/__pycache__/**"]
dev-mode-dirs = ["."]

[tool.hatch.build.targets.wheel.sources]
"" = "packages/exchange"
