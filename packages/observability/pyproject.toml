[project]
name = "scalper-v2-observability"
version = "0.1.0"
description = "structlog JSON setup, trace/correlation IDs, Prometheus metrics bootstrap. Scaffold stub; implementation lands in T-006."
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Same flat-layout / PEP 420 namespace pattern as packages/core per ADR-0002.
# Source modules land after T-006 stash-pop; glob avoids another pyproject.toml
# change at unpark. `__init__.py` is a docstring stub today so hatch has a
# non-empty wheel to build — T-006 overwrites it with the real re-exports
# (see TASKS.md Parked note).
[tool.hatch.build.targets.wheel]
include = ["*.py", "py.typed"]
exclude = ["tests/**", "**/__pycache__/**"]

[tool.hatch.build.targets.wheel.sources]
"" = "packages/observability"
