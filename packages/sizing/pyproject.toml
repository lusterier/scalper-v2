[project]
name = "scalper-v2-sizing"
version = "0.1.0"
description = "§B.1 tier-ladder position-sizing pure math (T-527b2a). Decimal-only, no I/O; T-527b2b wires it into the execution-service placement seam per ADR-0013."
requires-python = ">=3.12"
dependencies = [
    "scalper-v2-scoring",
]

[tool.uv.sources]
scalper-v2-scoring = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Hatch scaffold per ADR-0002 (verbatim-mirror packages/core): flat-layout
# source files live directly in packages/<name>/; sources remap adds the
# `packages/<name>/` wheel prefix so imports resolve as
# `from packages.<name> import ...`. Repo-root packages/__init__.py is
# excluded from every member wheel (PEP 420 at install time).
# dev-mode-dirs = ["."] bypasses hatchling's editable-mode detection.
[tool.hatch.build.targets.wheel]
include = ["*.py", "py.typed"]
exclude = ["tests/**", "**/__pycache__/**"]
dev-mode-dirs = ["."]

[tool.hatch.build.targets.wheel.sources]
"" = "packages/sizing"
