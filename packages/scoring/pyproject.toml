[project]
name = "scalper-v2-scoring"
version = "0.1.0"
description = "Rule language, condition types, and evaluator for per-bot scoring. T-300 ships foundational Pydantic types; F3 follow-ups build on top."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.13.2",
    "pyyaml==6.0.3",
    "scalper-v2-bus",
    "scalper-v2-core",
    "scalper-v2-db",
    "scalper-v2-features",
]

[tool.uv.sources]
scalper-v2-bus = { workspace = true }
scalper-v2-core = { workspace = true }
scalper-v2-db = { workspace = true }
scalper-v2-features = { workspace = true }
