# Production docker-compose for scalper-v2 (brief §18.1, §19 F0 bullet 2).
#
# Grown incrementally per F0 plan:
#   T-009: postgres.
#   T-012: nats + nats-init (JetStream topology bootstrap).
#   T-013a: prometheus, grafana + provisioning.
#   T-014 (this task): nginx, cloudflared.
#
# Services and volumes reflect the production shape: `/mnt/data/*` bind
# mounts on the Ubuntu host, Docker secret file for the DB password.
# Public ingress is via cloudflared → nginx on the backend network; the
# only host-side publish is `127.0.0.1:8080` on nginx for prod-host
# debugging only (loopback-bound, never LAN-exposed).
#
# For local development, overlay with compose.dev.yaml:
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d postgres nats
#
# Production pre-up steps (one-time per host) — see README under each
# infra/<service>/ subdirectory:
#   sudo mkdir -p /mnt/data/postgres /mnt/data/backups/postgres
#   sudo chown 999:999 /mnt/data/postgres /mnt/data/backups/postgres
#   sudo install -m 0600 -o root -g root <pwfile> /etc/scalper-v2/pg_password
#   sudo mkdir -p /mnt/data/nats/jetstream
#   sudo chmod 0700 /mnt/data/nats/jetstream
#   sudo mkdir -p /mnt/data/prometheus
#   sudo chown 65534:65534 /mnt/data/prometheus
#   sudo mkdir -p /mnt/data/grafana
#   sudo chown 472:0 /mnt/data/grafana
#   sudo install -m 0600 -o root -g root <cloudflared.env> /etc/scalper-v2/cloudflared.env

services:
  postgres:
    image: timescale/timescaledb:2.26.3-pg16
    restart: unless-stopped
    networks: [backend]
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
      - /mnt/data/backups/postgres:/backups
    environment:
      POSTGRES_USER: scalper
      POSTGRES_DB: scalper
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NATS JetStream — message bus + KV store (ADR-0001). Client 4222 and
  # monitoring 8222 are unpublished on the prod host; reachability is
  # fenced by the backend network (§16.6). Storage lives under
  # /mnt/data/nats/jetstream — subpath under /mnt/data/nats/ leaves room
  # for sibling artifacts (backups, archives) added in F1+. This deviates
  # from §18.1's verbatim /mnt/data/nats path but mirrors the
  # /mnt/data/postgres convention's intent (one root per service).
  nats:
    image: nats:2.12.7-alpine
    # Single source of truth for JetStream enablement and store_dir is
    # infra/nats/server.conf. Brief §18.1 shows `-js -sd /data` on the
    # CLI; dropping both here so removing the `jetstream {}` block from
    # the conf can never silently fall back to JS-enabled with a
    # default (ephemeral) store.
    command: ["-c", "/etc/nats/server.conf"]
    restart: unless-stopped
    networks: [backend]
    volumes:
      - /mnt/data/nats/jetstream:/data
      - ./infra/nats/server.conf:/etc/nats/server.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz?js-enabled-only=true"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # One-shot topology applier — runs on every `up`, exits 0 when streams
  # and KV buckets have converged on the spec under infra/nats/streams/.
  # Idempotent: existing resources are updated, missing ones are created.
  # See infra/nats/README.md "Bootstrap architecture".
  nats-init:
    image: natsio/nats-box:0.19.3
    restart: "no"
    networks: [backend]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./infra/nats/bootstrap.sh:/bootstrap.sh:ro
      - ./infra/nats/streams:/etc/nats/streams:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]

  # Prometheus — metrics scrape (brief §15.3, §16.6, §18.1). Config in
  # infra/prometheus/prometheus.yml, bind-mounted read-only. TSDB lives
  # under /mnt/data/prometheus with 15d retention. Client port 9090 is
  # unpublished on the prod host; Grafana proxies queries over the
  # backend network. See infra/prometheus/README.md for pre-up detail.
  prometheus:
    image: prom/prometheus:v3.11.2
    restart: unless-stopped
    networks: [backend]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      # --web.enable-lifecycle enables /-/reload for hot config
      # reload via POST without container restart (handy when
      # prometheus.yml changes). /-/healthy used by the healthcheck
      # below is always available regardless of this flag.
      - --web.enable-lifecycle
    volumes:
      - /mnt/data/prometheus:/prometheus
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # Grafana — dashboards (brief §15.4, §16.6, §18.1). Anonymous Viewer
  # auth is intentional: the backend network is fenced per §16.6 and
  # T-014's nginx only exposes signal-gateway + analytics-api, so
  # Grafana is never reachable from the public internet. Password
  # auth would add friction without a reachable attack surface. The
  # GF_SECURITY_ADMIN_PASSWORD=admin is a development default retained
  # for provisioning API calls; revisit if F1+ introduces UI-authored
  # dashboards. See infra/grafana/README.md for pre-up detail.
  grafana:
    image: grafana/grafana:13.0.1
    restart: unless-stopped
    networks: [backend]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - /mnt/data/grafana:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # signal-gateway — TradingView webhook ingress service (brief §9.1,
  # §18.1, §19 F0 bullet 8). T-015a ships the skeleton: /health, /ready,
  # /metrics; T-015b adds the full §9.1 validation pipeline at /webhook.
  # Built locally from this repo (release workflow with published images
  # is the T-018 forward ref). Port 8000 / path contract frozen by T-013a
  # infra/prometheus/prometheus.yml + T-014 infra/nginx/nginx.conf.
  # Internal-only per §16.6 — no host publish in the prod base; the dev
  # overlay (compose.dev.yaml) adds a loopback publish for smoke.
  signal-gateway:
    build:
      context: .
      dockerfile: services/signal_gateway/Dockerfile
    image: scalper-v2/signal-gateway:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      # required: false — prod hosts populate /etc/scalper-v2/secrets.env
      # with DATABASE_URL + SIGNAL_GATEWAY_HMAC_SECRET. Dev hosts drop
      # this reference via compose.dev.yaml `env_file: !reset null` and
      # supply the two vars via `environment:` overrides that expand from
      # the project-root .env (matches the T-009 POSTGRES_PASSWORD flow).
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: signal-gateway
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # python -c against /health — slim runtime image has no curl or
      # wget, but python + urllib are always on PATH via /app/.venv.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # market-data-svc — Binance WS consumer + OHLC pipeline (brief §9.2,
  # §18.1, §19 F1 bullet 2). T-100 ships the skeleton: lifespan wires
  # asyncpg.Pool + NatsClient + BinanceWsClient + SubscriptionManager
  # (T-102) + OhlcPipeline (T-104b); /health, /ready (bus + db + ws
  # checks), /metrics. Internal-only per §16.6 — no nginx route, no
  # public surface; communication is DB writes + NATS publishes.
  # Port 8000 internal; compose service-name DNS isolates from
  # signal-gateway:8000. Symbol seed via MARKET_DATA_SYMBOLS env
  # (F1 stopgap; F1+ swaps to bots+bot_configs JOIN once F3 lands the
  # bot registry — empty default → no consumer tasks → service still
  # healthy + ready).
  market-data-svc:
    build:
      context: .
      dockerfile: services/market_data/Dockerfile
    image: scalper-v2/market-data-svc:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      # required: false — prod hosts populate /etc/scalper-v2/secrets.env
      # with DATABASE_URL (shared with signal-gateway). Dev hosts drop
      # this reference via compose.dev.yaml `env_file: !reset null` and
      # supply DATABASE_URL via `environment:` overrides expanded from
      # the project-root .env (matches the T-009 / T-015a flow).
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: market-data-svc
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
      # F1 stopgap symbol seed. Operator overrides per deployment with
      # the comma-separated list of canonical Bybit-shape symbols, e.g.
      # "BTCUSDT,ETHUSDT". Empty (default) → OhlcPipeline.start([]) →
      # no consumer tasks → service stays healthy + ready emitting 0
      # rows. F1+ swap to bots+bot_configs JOIN once F3 ships the bot
      # registry.
      MARKET_DATA_SYMBOLS: ""
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # python -c against /health — slim runtime image has no curl or
      # wget, but python + urllib are always on PATH via /app/.venv.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # feature-engine — indicator computation on candle close (brief §9.3,
  # §18.1, §19 F1 bullet 3). T-109 ships the skeleton: lifespan wires
  # asyncpg.Pool + NatsClient; /health, /ready (bus + db checks),
  # /metrics. T-110 will extend the lifespan with the dispatcher +
  # registry + per-feature consumer. Internal-only per §16.6 — no nginx
  # route, no public surface; communication is DB writes (features
  # table per T-108) + NATS publishes (features.updated.>). Port 8000
  # internal; compose service-name DNS isolates from
  # signal-gateway:8000 + market-data-svc:8000.
  feature-engine:
    build:
      context: .
      dockerfile: services/feature_engine/Dockerfile
    image: scalper-v2/feature-engine:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      # required: false — prod hosts populate /etc/scalper-v2/secrets.env
      # with DATABASE_URL (shared with signal-gateway and market-data-svc).
      # Dev hosts drop this reference via compose.dev.yaml `env_file:
      # !reset null` and supply DATABASE_URL via `environment:` overrides
      # expanded from the project-root .env (matches the T-009 / T-015a /
      # T-100 flow).
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: feature-engine
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # python -c against /health — slim runtime image has no curl or
      # wget, but python + urllib are always on PATH via /app/.venv.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # execution-service — order placement, lifecycle FSM, cumulative-
  # delta reconciliation (brief §9.5, §18.1, §19 F2 milestone). T-214
  # ships the skeleton: lifespan wires asyncpg.Pool + NatsClient;
  # /health, /ready (bus + db checks), /metrics. T-215+ will extend
  # the lifespan with the adapter pool composition root + order
  # placement pipeline + dispatcher + audit loop + reconciliation.
  # Internal-only per §16.6 — no nginx route, no public surface;
  # primary input is NATS (orders.requests.<bot_id>); HTTP plane is
  # operational only (health + readiness + metrics). Port 8000
  # internal; compose service-name DNS isolates from signal-gateway:8000
  # + market-data-svc:8000 + feature-engine:8000.
  execution-service:
    build:
      context: .
      dockerfile: services/execution/Dockerfile
    image: scalper-v2/execution-service:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      # required: false — prod hosts populate /etc/scalper-v2/secrets.env
      # with DATABASE_URL (shared with signal-gateway, market-data-svc,
      # feature-engine). T-215 will add BOT_<ID>_BYBIT_API_KEY/SECRET
      # entries here per H-022. Dev hosts drop this reference via
      # compose.dev.yaml `env_file: !reset null` and supply DATABASE_URL
      # via `environment:` overrides expanded from the project-root .env
      # (matches the T-009 / T-015a / T-100 / T-109 flow).
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: execution-service
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      # python -c against /health — slim runtime image has no curl or
      # wget, but python + urllib are always on PATH via /app/.venv.
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # strategy-engine — per-bot decision process (brief §9.4, §18.1, §19 F3
  # milestone). Two named compose services per BRIEF §18.1:2374-2384 verbatim
  # shape: strategy-engine-alpha + strategy-engine-beta share the same image
  # (single Dockerfile T-309) parameterized by BOT_ID. Each container loads
  # configs/bots/<bot_id>.yaml at lifespan startup (T-310a-validated BotConfig
  # sections) and runs the §9.4 main-loop signal consumer (T-310b). Internal-
  # only per §16.6 — no nginx route, no public surface; primary input is NATS
  # (signals.validated). Port 8000 internal; service-name DNS isolates from
  # execution-service:8000 + feature-engine:8000 + market-data-svc:8000 +
  # signal-gateway:8000.
  #
  # BOT_CONFIRM_LIVE: ${BOT_<ID>_CONFIRM_LIVE:-} per BRIEF §18.1:2379 verbatim
  # + §16.5:2245 — env-var passthrough ONLY at compose layer. Runtime
  # enforcement (lifespan fail-fast on exchange.mode==live AND missing
  # BOT_CONFIRM_LIVE=yes, plus LIVE MODE ENGAGED warning + Telegram alert)
  # is T-F3+ deferred per §0.8 anti-hypothetical; today no service code
  # reads the var, T-311 ships brief-required wiring so future task can land
  # the lifespan check in a single small diff.
  strategy-engine-alpha:
    build:
      context: .
      dockerfile: services/strategy_engine/Dockerfile
    image: scalper-v2/strategy-engine:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: strategy-engine
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
      BOT_ID: alpha
      BOT_CONFIG_DIR: /app/configs/bots
      PLUGIN_REGISTRY_PATH: /app/configs/plugin_registry.yaml
      BOT_CONFIRM_LIVE: ${BOT_ALPHA_CONFIRM_LIVE:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # strategy-engine-beta — second per-bot compose service variant. Same
  # image as strategy-engine-alpha; service-name DNS + BOT_ID env-var
  # isolate. T-313 E1 dvoj-bot integration test brings up both.
  strategy-engine-beta:
    build:
      context: .
      dockerfile: services/strategy_engine/Dockerfile
    image: scalper-v2/strategy-engine:dev
    restart: unless-stopped
    networks: [backend]
    env_file:
      - path: /etc/scalper-v2/secrets.env
        required: false
    environment:
      SERVICE_NAME: strategy-engine
      LOG_LEVEL: INFO
      NATS_URL: nats://nats:4222
      BOT_ID: beta
      BOT_CONFIG_DIR: /app/configs/bots
      PLUGIN_REGISTRY_PATH: /app/configs/plugin_registry.yaml
      BOT_CONFIRM_LIVE: ${BOT_BETA_CONFIRM_LIVE:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # nginx reverse proxy (brief §2.1, §16.3, §16.6, §18.1). Terminal
  # backend for cloudflared; single server block with path-based
  # dispatch. /webhook, /health, /ready proxy to signal-gateway
  # (T-015 — 502 until then, variable-based proxy_pass + Docker
  # embedded DNS defers resolution so nginx doesn't crash at boot).
  # Security headers + JSON access logs on all responses. See
  # infra/nginx/README.md for routing map and smoke verification.
  nginx:
    image: nginx:1.30.0-alpine
    restart: unless-stopped
    networks: [backend]
    ports:
      # Loopback publish for prod-host debugging only; cloudflared
      # reaches nginx via service-name DNS on the backend network,
      # not through this publish. LAN is never exposed (§16.6).
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      # 127.0.0.1 (not `localhost`): busybox wget in nginx:alpine
      # resolves `localhost` to ::1 first, and nginx's `listen 80`
      # is IPv4-only — would return "Connection refused" and keep
      # the service stuck unhealthy. Sibling services
      # (prom/grafana/nats) use `localhost` safely because their
      # default listen is dual-stack; nginx is not.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Cloudflare Tunnel egress (brief §2.1, §16.3). Env-var token
  # mode: ingress rules live in the Cloudflare dashboard, not in
  # repo. TLS terminates at Cloudflare edge; cloudflared → nginx
  # is plain HTTP over the backend network. Dev hosts omit this
  # service from `docker compose up -d <selection>`; the dev
  # overlay resets env_file (`!reset null`) so `docker compose
  # config` renders cleanly without /etc/scalper-v2/cloudflared.env
  # being readable. `required: false` in the base covers the
  # "file missing" case, but not "parent unreadable" (EACCES on
  # 0750 /etc/scalper-v2 during `config` rendering).
  #
  # No healthcheck: the image is distroless (no shell / wget /
  # curl — verified via `docker image inspect`, User=65532:65532).
  # §18.4 divergence; liveness comes from restart: unless-stopped
  # + Cloudflare dashboard tunnel health + compose logs. See
  # infra/cloudflared/README.md for tunnel + token pre-up.
  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    restart: unless-stopped
    networks: [backend]
    command: ["tunnel", "--no-autoupdate", "run"]
    env_file:
      - path: /etc/scalper-v2/cloudflared.env
        required: false
    depends_on:
      nginx:
        condition: service_healthy

networks:
  backend:
    driver: bridge

secrets:
  pg_password:
    file: /etc/scalper-v2/pg_password
