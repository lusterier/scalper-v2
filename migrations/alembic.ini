; Alembic configuration for scalper-v2 (brief §N8, §7.4, §19 F0 bullet 3).
;
; Run from the repo root:
;
;   uv run alembic -c migrations/alembic.ini upgrade head
;   uv run alembic -c migrations/alembic.ini revision --rev-id 0002 -m "signals"
;
; Script location, file template and database URL are the only knobs
; deliberately set. Everything else stays on Alembic's own defaults so
; `alembic --help` output matches upstream documentation.
;
; sqlalchemy.url is intentionally empty — env.py reads the DSN from
; the POSTGRES_URL environment variable at runtime so credentials
; never land on disk (brief §5.11, §16).

[alembic]
script_location = %(here)s
prepend_sys_path = .
path_separator = os

; Zero-padded monotonic revision names: `0001_initial_core_tables.py`,
; `0002_signals_hypertable.py`, … Create with `--rev-id NNNN`.
file_template = %%(rev)s_%%(slug)s

; Empty — the async env.py resolves the DSN from $POSTGRES_URL and
; applies asyncpg-specific server_settings (application_name).
sqlalchemy.url =

[post_write_hooks]
; ruff runs via pre-commit on the versions/ tree; no post-write hook here.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
