name: release

# Per-service Docker image build + push to GHCR on git tag (`v*`).
# Spec: §3.1, §6.5, §18, §18.5, §19 F0 bullet 11.
#
# Trigger contract:
#   * `push` on tags matching `v*` — produces both `<git-tag>` and
#     `sha-<short>` image tags.
#   * `workflow_dispatch` — manual trigger from the Actions UI; produces
#     only `sha-<short>` (no tag in event context). Use for first-time
#     verification before cutting a real release tag.
#
# Service matrix is hardcoded to `signal_gateway` — the only service with
# a Dockerfile in F0. Each F1 service-ship task appends its name to
# `strategy.matrix.service` in the same PR that lands its Dockerfile.
# §0.8: no scaffolding for hypothetical services.
#
# `:latest` is intentionally NOT produced. §18.5 deploy script signature
# is `./scripts/deploy.sh <git-sha>` — pulls by SHA, no floating handle
# needed. Adding `:latest` would also raise the prerelease question
# (`v1.0.0-rc1` advancing `:latest`?) prematurely.
#
# Operator action items (one-time, post-first-push):
#   1. If first tag-push 403s on `packages: write`, flip Settings →
#      Actions → General → Workflow permissions to "Read and write".
#   2. New GHCR package defaults to PRIVATE (matches repo). To make
#      public, toggle at github.com/users/lusterier/packages/container/
#      scalper-v2%2Fsignal_gateway/settings.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # `cancel-in-progress: false` — release builds are commit-of-record
  # artifacts; canceling on a superseding push would leave the registry
  # state inconsistent with what was pushed.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        service: [signal_gateway]
      # `fail-fast: false` keeps surviving services in the matrix going
      # if one fails — relevant once the matrix has more than one entry.
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      # BuildKit driver — required for the existing
      # `--mount=type=cache,target=/root/.cache/uv` instruction in
      # services/signal_gateway/Dockerfile and for the GHA cache backend
      # below.
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag rules:
      #   `type=ref,event=tag`     → the literal git tag (e.g. `v1.2.3`)
      #   `type=sha,prefix=sha-`   → `sha-<7-char>` on every event
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      # Build context = repo root (uv workspace requires `pyproject.toml`
      # + `uv.lock` + `packages/` siblings of the per-service tree).
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
