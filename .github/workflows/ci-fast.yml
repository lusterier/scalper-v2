name: ci-fast

# Lint + type-check + unit tests on every push and pull request.
# Spec: §0.4, §6.5, §17.6, §19 F0 bullet 1.

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev --frozen

      - run: uv run mypy

  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-packages --group dev --frozen

      # pytest filters per §17.6: --ignore=tests/integration keeps the
      # testcontainers-backed suites in ci-full; -m 'not slow' excludes
      # @slow/@e2e markers (Bybit testnet etc. per §17.1).
      - run: uv run pytest -q --ignore=tests/integration -m 'not slow'

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
