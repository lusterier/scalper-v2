# Pre-commit hooks for scalper-v2.
#
# Install once:   uv run pre-commit install
# Run manually:   uv run pre-commit run --all-files
#
# The mypy and bandit hooks run via `uv run` so they pick up workspace
# dependencies automatically. Ruff is standalone and runs from its own
# pre-commit repo for fast isolated execution.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

      - id: bandit
        name: bandit (security)
        entry: uv run bandit
        language: system
        types: [python]
        pass_filenames: false
        args: ["-c", "pyproject.toml", "-r", "services", "packages"]
