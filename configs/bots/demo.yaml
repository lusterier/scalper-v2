# demo — first real bot on the Bybit demo account. Created by ops task
# 2026-05-17. exchange.mode: live because the Bybit demo account uses the
# LIVE API endpoint (not testnet). scoring.mode: passthrough + rules: []
# → every well-formed signal becomes decision="passthrough" with ZERO
# feature resolution (no oi_change / feature-engine dependency) — mirrors
# smoke.yaml. String-quoted Decimals avoid PyYAML float artefacts.
#
# NOTE: per-bot Bybit key wiring into execution-service is T-215 (not yet
# implemented). Until then this bot cannot place live orders even with
# real BOT_DEMO_BYBIT_API_KEY/SECRET in secrets.env.

bot_id: demo
version: 1

exchange:
  mode: live
  account: sub_demo
  api_key_env: BOT_DEMO_BYBIT_API_KEY
  api_secret_env: BOT_DEMO_BYBIT_API_SECRET

signals:
  ttl_seconds: 120
  source_filter: ["tv_demo"]

trading:
  universe: [BTCUSDT]

execution:
  qty: "0.001"
  leverage: 10
  sl_pct: "0.01"
  tp_pct: "0.015"
  tp_qty_pct: "0.5"
  be_trigger: "0.005"
  be_sl_level: "0.003"
  trail_pct: "0.005"
  fee_rate: "0.00055"

scoring:
  mode: passthrough
  trigger_threshold: 1.0
  rules: []

# Conservative risk: single concurrent trade per bot, opposite-side guard
# on (H-005, default). All cooldown / global-cap / loss-limit knobs 0 =
# disabled.
risk:
  cooldown_after_loss_minutes: 0
  cooldown_after_streak_n_losses: 0
  cooldown_after_streak_n_losses_minutes: 0
  max_open_trades_per_bot: 1
  max_open_trades_global: 0
  daily_loss_limit_usd: "0"
  max_drawdown_pct: "0"
  block_opposite_side: true
