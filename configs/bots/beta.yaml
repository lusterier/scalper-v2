# T-313 E1 fixture — beta bot config per BRIEF §B.1 + §19:2549 passthrough +
# §19:2550 oi_squeeze plugin verification. Pairs with alpha.yaml (active mode).
#
# Passthrough mode + 1 oi_squeeze plugin rule → decision="passthrough" regardless
# of plugin's contribution (T-307 evaluator overrides decision when mode=passthrough).
#
# Plugin condition requires rule-level `feature:` per T-308 yaml_loader Path A
# operator-approved 2026-05-02 rejection of plugin-without-feature.
#
# WG#1: execution.* identical to alpha.yaml (only bot_id + scoring differ).
# String-quoted Decimal values avoid PyYAML float→Decimal precision artefacts.

bot_id: beta
version: 1

exchange:
  mode: paper
  account: sub_beta
  api_key_env: BOT_BETA_BYBIT_API_KEY
  api_secret_env: BOT_BETA_BYBIT_API_SECRET

signals:
  ttl_seconds: 120

trading:
  universe: [BTCUSDT, ETHUSDT]

execution:
  qty: "0.001"
  leverage: 20
  sl_pct: "0.01"
  tp_pct: "0.01"
  tp_qty_pct: "0.5"
  be_trigger: "0.005"
  be_sl_level: "0.003"
  trail_pct: "0.005"
  fee_rate: "0.00055"

scoring:
  mode: passthrough
  trigger_threshold: 1.0
  rules:
    - name: oi_squeeze_v2
      weight: 1.0
      feature: ind.${signal.symbol}.15m.oi_change
      condition:
        type: plugin
        name: oi_squeeze
        version: 2
        params:
          lookback_candles: 5
          oi_drop_pct: 1.0

# T-526/T-524 risk: block — all-zero defaults disable cooldown + caps gates
# (no behavior change vs baseline). See alpha.yaml comment for details.
risk:
  cooldown_after_loss_minutes: 0
  cooldown_after_streak_n_losses: 0
  cooldown_after_streak_n_losses_minutes: 0
  max_open_trades_per_bot: 0
  max_open_trades_global: 0
  daily_loss_limit_usd: "0"
  max_drawdown_pct: "0"
