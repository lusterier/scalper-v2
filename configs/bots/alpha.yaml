# T-313 E1 fixture — alpha bot config per BRIEF §B.1 + §19:2547 dvoj-bot exit criterion.
#
# Active scoring mode + 1 always-true rule → decision="execute" for any signal
# whose feature_snapshot includes ind.<symbol>.15m.oi_change with positive value.
# Pairs with beta.yaml (passthrough mode) for E1 "react differently" verification.
#
# WG#1: execution.* fields verbatim from §B.1:2934-2944; qty per T-310a OQ-4
# deviation (§B.1 has separate sizing.tiers; T-310a simplifies to per-bot fixed).
# String-quoted Decimal values avoid PyYAML float→Decimal precision artefacts.

bot_id: alpha
version: 1

exchange:
  mode: paper
  account: sub_alpha
  api_key_env: BOT_ALPHA_BYBIT_API_KEY
  api_secret_env: BOT_ALPHA_BYBIT_API_SECRET

signals:
  ttl_seconds: 120

trading:
  universe: [BTCUSDT, ETHUSDT]

execution:
  qty: "0.001"
  leverage: 20
  sl_pct: "0.01"
  tp_pct: "0.01"
  tp_qty_pct: "0.5"
  be_trigger: "0.005"
  be_sl_level: "0.003"
  trail_pct: "0.005"
  fee_rate: "0.00055"

scoring:
  mode: active
  trigger_threshold: 1.0
  rules:
    - name: always_in_universe
      weight: 2.0
      feature: ind.${signal.symbol}.15m.oi_change
      condition:
        type: gt
        feature: ind.${signal.symbol}.15m.oi_change
        value: "-999999.0"

# T-526/T-524 risk: block — all-zero defaults disable the pre-scoring cooldown
# gate (T-526) AND the concurrent-trades caps gate (T-524). No behavior change
# vs baseline. Operator activates per-bot by setting non-zero values; see
# packages/scoring/types.py::RiskSection for semantics. Block presence (vs
# absence) makes no difference — yaml_loader falls back to default
# RiskSection() when block is missing.
risk:
  cooldown_after_loss_minutes: 0
  cooldown_after_streak_n_losses: 0
  cooldown_after_streak_n_losses_minutes: 0
  max_open_trades_per_bot: 0
  max_open_trades_global: 0
  daily_loss_limit_usd: "0"
