# scalper-v2 nginx reverse proxy (brief §2.1, §16.3, §16.6, §18.1).
#
# Behind Cloudflare Tunnel. TLS terminates at Cloudflare edge;
# backend network traffic is plain HTTP. Single server block,
# single upstream (signal-gateway, landing in T-015), path-based
# dispatch.
#
# F0 scope notes:
#   * Only /webhook, /health, /ready proxy upstream. 502 until
#     T-015 lands the signal-gateway service. DNS is deferred to
#     request time via the Docker embedded resolver (127.0.0.11)
#     + variable-based proxy_pass, so nginx doesn't crash on
#     startup when signal-gateway isn't in the compose up set.
#   * /healthz returns 200 "ok" for docker-compose healthcheck
#     and host-side smoke (access_log off — out of the signal).
#   * All other paths return 404.
#
# Forward references:
#   T-015 — signal-gateway lights up /webhook, /health, /ready
#           (502 → 200 flip; port/path contract frozen here and
#           mirrored in infra/prometheus/prometheus.yml).
#   T-F3  — analytics-api nginx route (omitted from F0 scope;
#           service doesn't exist yet, no contract to freeze).
#   F4    — dashboard UI static serve: + ./ui/dist mount +
#           `location /` block (replaces the 404 fallback).

user nginx;
worker_processes auto;

error_log /dev/stderr info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # JSON access logs — matches the brief-wide "JSON logs from
    # day zero" posture (brief §N2, §15). Keys cover request
    # identity (request_id), client provenance (remote_addr,
    # user_agent), request line + response (method, uri, status,
    # body_bytes_sent, request_time), and upstream observability
    # (upstream_addr, upstream_status, upstream_response_time)
    # — the upstream trio mirrors the brief §15.3 histogram
    # shape (webhook_processing_seconds) on the nginx tier.
    #
    # Error log stays default text format; nginx doesn't emit
    # structured error logs without third-party patches.
    log_format json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$request_id",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /dev/stdout json;

    default_type  text/plain;
    server_tokens off;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65s;
    client_max_body_size 64k;

    # Docker embedded DNS — lets the variable-based proxy_pass
    # resolve `signal-gateway` at request time, not at startup.
    # Without this, nginx fails to boot when signal-gateway
    # isn't up yet (T-014 ships before T-015).
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80 default_server;
        server_name _;

        # Security headers (brief §16). `always` flag emits on
        # 4xx/5xx too so 502-until-T-015 responses still carry
        # the asserted posture. Child `location` blocks inherit
        # these only if they declare no `add_header` of their
        # own — kept deliberately: no add_header inside
        # locations below.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        # nginx self-liveness — docker healthcheck target, also
        # usable for host-side smoke. access_log off keeps
        # probe traffic out of the JSON log stream.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # signal-gateway proxy (brief §9.1). Variable-based
        # proxy_pass defers DNS to request time; returns 502
        # until T-015 lands the backend. Port 8000 / path
        # contract frozen here + in infra/prometheus/prometheus.yml.
        # Rate limiting stays in signal-gateway (20 req/60s
        # sliding window, §9.1 step 3); no nginx-tier throttle.
        location ~ ^/(webhook|health|ready)$ {
            set $signal_gateway_upstream http://signal-gateway:8000;
            proxy_pass $signal_gateway_upstream$request_uri;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID      $request_id;

            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # Fallback — F4 dashboard-UI static serve replaces this
        # with `root /usr/share/nginx/html; try_files $uri /index.html;`
        # plus the ./ui/dist bind mount on the service.
        location / {
            return 404 "not found\n";
        }
    }
}
