# NATS server configuration for scalper-v2 (brief §8, §16.6, §18.1).
#
# F0 scope: single-node JetStream on the project `backend` network. No
# cluster, no authentication — reachability is fenced by the Docker
# network (§16.6 "internal-only by default"). Neither the client port
# (4222) nor the monitoring port (8222) is published on the prod host;
# compose.dev.yaml publishes 4222 on 127.0.0.1 for host-side tooling.

# Client protocol listener. Bound on all interfaces inside the container;
# the backend network restricts reachability.
port: 4222

# HTTP monitoring + /healthz. Consumed by the container healthcheck and
# scraped by Prometheus over the backend network in T-013.
http_port: 8222

# JetStream persistence. store_dir matches the bind mount / named volume
# target in compose.yaml / compose.dev.yaml. max_memory_store /
# max_file_store left unset — NATS picks host-aware defaults; F0 traffic
# (<1000 signals/day, sub-10 bots per ADR-0001) fits comfortably.
jetstream {
  store_dir: "/data"
}

# Logging: info level, timestamped lines to stdout so `docker compose
# logs nats` remains the canonical source. Debug/trace off; flip via
# command-line override when diagnosing.
debug: false
trace: false
logtime: true
