# Development overlay for compose.yaml (brief §18.1, §19 F0 bullet 2).
#
# Activate with:
#
#   docker compose -f compose.yaml -f compose.dev.yaml up -d postgres nats
#
# Deltas vs compose.yaml (production base):
#
# postgres:
#   * Volume: wholesale replaces the base's two bind mounts with a single
#     named docker volume (works on any host, no sudo or `/mnt/data`
#     provisioning). `!override` is required — Compose v2 merge appends
#     sequences by default, and the base's `/backups` bind has a
#     different target path so it would otherwise survive the merge.
#   * Secret: wholesale clears the base's Docker-secret reference via
#     `!reset` so `pg_password` is not mounted. Without `!reset` the
#     base list entry would persist (sequence append).
#     `POSTGRES_PASSWORD_FILE` is emptied so the postgres-image
#     entrypoint's "both set (but are exclusive)" guard stays quiet,
#     and `POSTGRES_PASSWORD` is injected inline from the project
#     `.env` so dev hosts don't need `/etc/scalper-v2/pg_password`.
#   * Port: publishes `127.0.0.1:5432:5432` so host-side `psql` and
#     asyncpg from the dev virtualenv can reach the DB. Localhost-bound
#     only; never exposed on the LAN.
#
# nats:
#   * Volume: `!override` swaps the `/mnt/data/nats/jetstream` bind for a
#     named docker volume (`nats_data`), and drops the `server.conf`
#     bind entry via the same list-replacement — the conf re-enters
#     below via map-merge on `volumes` (NOTE: map-merge doesn't apply
#     to sequence keys, so the conf is re-listed explicitly).
#   * Port: publishes `127.0.0.1:4222:4222` so host-side `nats` CLI /
#     smoke tests can reach the server. 8222 stays internal in both
#     prod and dev — monitoring is consumed over the backend network
#     (a follow-up task adds a prometheus-nats-exporter sidecar; see
#     infra/nats/README.md forward references).
#
# prometheus:
#   * Volume: `!override` swaps the `/mnt/data/prometheus` bind for a
#     named docker volume (`prometheus_data`), and re-lists the
#     `prometheus.yml` config bind via the same list-replacement.
#   * Port: publishes `127.0.0.1:9090:9090` so the Prometheus web UI
#     and host-side `curl /api/v1/targets` smoke tests are reachable.
#
# grafana:
#   * Volume: `!override` swaps the `/mnt/data/grafana` bind for a
#     named docker volume (`grafana_data`), and re-lists the
#     `provisioning` + `dashboards` binds via the same list-replacement.
#   * Port: publishes `127.0.0.1:3000:3000` so the Grafana UI is
#     reachable from the dev host browser at http://127.0.0.1:3000.
#
# nats-init needs no dev override — it runs identically on both
# environments, reading the same stream JSONs via bind mount and
# talking to `nats` over the backend network.
#
# `POSTGRES_USER` / `POSTGRES_DB` are not redeclared — map merge by key
# propagates the base's values. Only the deltas appear here.

services:
  postgres:
    volumes: !override
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD_FILE: ""
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    secrets: !reset null
    ports:
      - "127.0.0.1:5432:5432"

  nats:
    volumes: !override
      - nats_data:/data
      - ./infra/nats/server.conf:/etc/nats/server.conf:ro
    ports:
      - "127.0.0.1:4222:4222"

  prometheus:
    volumes: !override
      - prometheus_data:/prometheus
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    volumes: !override
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres_data:
  nats_data:
  prometheus_data:
  grafana_data:
